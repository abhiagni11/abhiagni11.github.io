---
layout: default
title: Robotics
---

<div class="robotics">
  {% for project in site.categories.robotics %}
  <div class="project">
    <h2 class="project-title">
      <a href="{{ site.baseurl }}{{ project.url }}">
        {{ project.title }}
      </a>
    </h2>

    <span class="project-date">{{ project.date | date_to_string }}</span>
  </div>
  {% endfor %}
</div>
