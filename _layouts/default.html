<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}
  {% seo %}
  
  <script type="text/javascript">
    var imageURLs = [
         "/data/images/eng-abhiagni-72.png"
       , "/data/images/hin-abhiagni-72.png"
    ];
    function getImageTag() {
      var img = '<img src=\"';
      var randomIndex = Math.floor(Math.random() * imageURLs.length);
      img += imageURLs[randomIndex];
      img += '\" alt=\"Some alt text\"/>';
      return img;
    }
  </script>
  
  <body class="theme-base-maroon">

    {% include sidebar.html %}

    <!-- Wrap is the content to shift when toggling the sidebar. We wrap the
         content to avoid any CSS collisions with our real content. -->
    <div class="wrap">
      <div class="masthead">
        <div class="container">
          <h1 class="masthead-title">
            <!-- <a href="{{ site.baseurl }}/" title="Home"><strong>&#x2605 A B H I &#x2605 A G N I &#x2605</strong></a> 
              https://www.w3schools.com/charsets/ref_utf_symbols.asp -->
            <a href="{{ site.baseurl }}/" title="Home"><strong>
              <script type="text/javascript">
                <center>
                document.write(getImageTag());
                </center>
              </script>
              </strong></a>
            <small>{{ site.tagline }}</small>
          </h1>
        </div>
      </div>

      <div class="container content">
        {{ content }}
      </div>
  
    </div>

    <label for="sidebar-checkbox" class="sidebar-toggle"></label>

    <script>
      (function(document) {
        var toggle = document.querySelector('.sidebar-toggle');
        var sidebar = document.querySelector('#sidebar');
        var checkbox = document.querySelector('#sidebar-checkbox');

        document.addEventListener('click', function(e) {
          var target = e.target;

          if(!checkbox.checked ||
             sidebar.contains(target) ||
             (target === checkbox || target === toggle)) return;

          checkbox.checked = false;
        }, false);
      })(document);
    </script>
  </body>
</html>
